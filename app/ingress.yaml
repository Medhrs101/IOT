apiVersion: networking.k8s.io/v1 # Why? The standard API for external routing.
kind: Ingress # Why? Rules that tell the Traefik (LoadBalancer) how to route external traffic.
metadata:
  name: my-app-ingress # Why? Name of the routing rule.
  namespace: dev # Why? Must be in the 'dev' namespace to find the 'my-app-service'.
spec:
  rules:
  - host: app.com # Why? The domain name. You'll use this in your 'curl -H "Host: app.com"' tests.
    http:
      paths:
      - path: / # Why? Routes all traffic starting from the root URL.
        pathType: Prefix # Why? Matches any URL that starts with '/'.
        backend:
          service:
            name: my-app-service # Why? Tells Ingress to send the traffic to your Service.
            port:
              number: 80 # Why? Matches the port defined in 'service.yaml'.